<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#197fe6",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111921",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>PocketLedger - Splash Screen</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display flex items-center justify-center min-h-screen">
<div class="relative flex h-screen w-full max-w-md flex-col bg-background-light dark:bg-background-dark overflow-hidden shadow-2xl">
<div class="flex-1 flex flex-col items-center justify-center px-8 text-center">
<div class="mb-12 relative">
<div class="absolute inset-0 bg-primary/10 blur-3xl rounded-full scale-150"></div>
<div class="relative w-32 h-32 bg-primary rounded-3xl flex items-center justify-center shadow-lg transform rotate-3">
<span class="material-symbols-outlined text-white text-7xl select-none" data-icon="airport_shuttle">
                        airport_shuttle
                    </span>
<div class="absolute -bottom-2 -right-2 w-12 h-12 bg-white dark:bg-slate-800 rounded-xl flex items-center justify-center shadow-md -rotate-12">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="payments">
                            payments
                        </span>
</div>
</div>
</div>
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-4xl font-bold leading-tight pb-2">
                PocketLedger
            </h1>
<p class="text-slate-600 dark:text-slate-400 text-lg font-medium leading-relaxed max-w-[280px]">
                Your premium Filipino-geared budgetting companion
            </p>
<div class="w-full max-w-[240px] mt-16 space-y-4">
<div class="flex flex-col gap-3">
<div class="flex justify-between items-center px-1">
<p class="text-primary text-sm font-semibold uppercase tracking-widest">Initialising</p>
<span class="text-slate-400 dark:text-slate-500 text-xs font-medium">30%</span>
</div>
<div class="h-1.5 w-full bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full transition-all duration-1000" style="width: 30%;"></div>
</div>
</div>
</div>
</div>
<div class="pb-12 text-center">
<div class="flex items-center justify-center gap-2 mb-2">
<span class="material-symbols-outlined text-slate-400 text-sm" data-icon="location_on">location_on</span>
<p class="text-slate-400 dark:text-slate-500 text-sm font-medium uppercase tracking-widest">Mabuhay!</p>
</div>
<div class="h-1 w-8 bg-primary/30 mx-auto rounded-full"></div>
</div>
<div class="absolute top-[-10%] right-[-10%] w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute bottom-[-5%] left-[-10%] w-48 h-48 bg-primary/5 rounded-full blur-3xl"></div>
</div>
</body></html>
