services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: budgettracker-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development

      # DB pieces (if you use these in code)
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}

      # Optional (only if you already use JWT)
      - JWT_SECRET=${JWT_SECRET}
      - JWT_SECRET_REFRESH=${JWT_SECRET_REFRESH}

      # Helps file watching inside Docker
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - budgettracker-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: budgettracker-db
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_HOST_AUTH_METHOD=md5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Optional: put init SQL files here (only runs on first DB init)
      # - ./server/src/db/migrations:/docker-entrypoint-initdb.d
    networks:
      - budgettracker-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

networks:
  budgettracker-network:
    driver: bridge
